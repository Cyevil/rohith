<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rohith Mummadi - Offensive Security">
  <defs>
    <!-- neon bloom -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- CRT horizontal line texture -->
    <pattern id="crt" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#0a0e14"/>
      <rect width="3" height="1" y="2" fill="#05d9e8" opacity="0.05"/>
    </pattern>

    <!-- vignette -->
    <radialGradient id="vig" cx="50%" cy="48%" r="75%">
      <stop offset="55%" stop-color="#0a0e14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </radialGradient>

    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#05d9e8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05d9e8" stop-opacity="0.18"/>
    </linearGradient>

    <!-- glitch slice clips -->
    <clipPath id="sliceA"><rect id="rA" x="0" y="150" width="1000" height="10"/></clipPath>
    <clipPath id="sliceB"><rect id="rB" x="0" y="172" width="1000" height="7"/></clipPath>
  </defs>

  <style>
    text { font-family: 'JetBrains Mono','Consolas','Courier New',monospace; }
    .prompt { fill:#05d9e8; font-size:22px; font-weight:600; }
    .path   { fill:#ff2a6d; }
    .cmd    { fill:#e6edf3; }
    .name   { font-size:74px; font-weight:800; letter-spacing:2px; }
    .role   { fill:#ff2a6d; font-size:21px; font-weight:600; letter-spacing:3px; }

    .base { fill:#e6edf3; filter:url(#glow); }
    .cy   { fill:#05d9e8; opacity:.9; animation:gA 4s infinite steps(1); }
    .mg   { fill:#ff2a6d; opacity:.9; animation:gB 4s infinite steps(1); }

    @keyframes gA {
      0%,40%,100%{transform:translate(0,0)} 41%{transform:translate(-4px,1px)}
      43%{transform:translate(0,0)} 78%{transform:translate(0,0)}
      80%{transform:translate(3px,-2px)} 82%{transform:translate(0,0)}
    }
    @keyframes gB {
      0%,40%,100%{transform:translate(0,0)} 41%{transform:translate(4px,-1px)}
      43%{transform:translate(0,0)} 78%{transform:translate(0,0)}
      80%{transform:translate(-3px,2px)} 82%{transform:translate(0,0)}
    }
    /* tearing slices jump sideways on glitch beats */
    #rA{animation:tearA 4s infinite steps(1)} #rB{animation:tearB 4s infinite steps(1)}
    @keyframes tearA{0%,40%{transform:translate(0,0)}41%{transform:translate(18px,0)}45%{transform:translate(0,0)}100%{transform:translate(0,0)}}
    @keyframes tearB{0%,78%{transform:translate(0,0)}80%{transform:translate(-22px,0)}84%{transform:translate(0,0)}100%{transform:translate(0,0)}}

    .cursor { fill:#05d9e8; animation:blink 1.05s steps(1) infinite; }
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

    .scan { animation:scan 5s linear infinite; }
    @keyframes scan{0%{transform:translateY(-20px)}100%{transform:translateY(320px)}}

    .flick { animation:flick 7s infinite; }
    @keyframes flick{0%,96%,100%{opacity:1}97%{opacity:.55}98%{opacity:1}99%{opacity:.7}}
  </style>

  <!-- backdrop -->
  <rect width="1000" height="300" fill="#0a0e14"/>
  <rect width="1000" height="300" fill="url(#crt)"/>

  <!-- perspective floor grid -->
  <g stroke="#05d9e8" stroke-width="1" opacity="0.5">
    <line x1="-200" y1="300" x2="350" y2="210" stroke="url(#floor)"/>
    <line x1="80"   y1="300" x2="420" y2="210" stroke="url(#floor)"/>
    <line x1="360"  y1="300" x2="490" y2="210" stroke="url(#floor)"/>
    <line x1="640"  y1="300" x2="560" y2="210" stroke="url(#floor)"/>
    <line x1="920"  y1="300" x2="630" y2="210" stroke="url(#floor)"/>
    <line x1="1200" y1="300" x2="700" y2="210" stroke="url(#floor)"/>
    <line x1="0" y1="300" x2="1000" y2="300" stroke="#05d9e8" stroke-opacity="0.15"/>
    <line x1="120" y1="262" x2="880" y2="262" stroke="#05d9e8" stroke-opacity="0.10"/>
    <line x1="220" y1="232" x2="780" y2="232" stroke="#05d9e8" stroke-opacity="0.07"/>
  </g>

  <g class="flick">
    <!-- kali prompt -->
    <text x="60" y="56" class="prompt">┌──(<tspan class="cmd">rohith</tspan>㉿<tspan class="cmd">kali</tspan>)-[<tspan class="path">~/profile</tspan>]</text>
    <text x="60" y="86" class="prompt">└─$ <tspan class="cmd">whoami</tspan> <tspan class="path">--verbose</tspan></text>

    <!-- glitch name: layered chromatic split + tearing slices -->
    <g class="name">
      <text class="cy" x="58" y="172">ROHITH MUMMADI</text>
      <text class="mg" x="58" y="172">ROHITH MUMMADI</text>
      <text class="base" x="58" y="172">ROHITH MUMMADI</text>
      <g clip-path="url(#sliceA)"><text class="cy"  x="58" y="172">ROHITH MUMMADI</text></g>
      <g clip-path="url(#sliceB)"><text class="mg" x="58" y="172">ROHITH MUMMADI</text></g>
    </g>

    <!-- role line -->
    <text x="60" y="212" class="role">[ OFFENSIVE&#160;SECURITY // BLUE&#160;TEAM // CLOUD ]</text>
    <!-- blinking cursor after the command -->
    <rect class="cursor" x="350" y="71" width="13" height="18"/>
  </g>

  <!-- moving scanline -->
  <rect class="scan" x="0" y="0" width="1000" height="6" fill="#05d9e8" opacity="0.07"/>
  <!-- vignette on top -->
  <rect width="1000" height="300" fill="url(#vig)"/>
</svg>
